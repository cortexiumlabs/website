<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cortexium Labs - Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  color: white;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
}

/* ===== BACKGROUND ===== */
.bg {
  position: absolute;
  inset: 0;
  z-index: -3;
  background:
    radial-gradient(circle at 25% 30%, rgba(0, 120, 255, 0.18), transparent 40%),
    radial-gradient(circle at 75% 70%, rgba(0, 255, 200, 0.12), transparent 40%),
    radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 60%),
    linear-gradient(to bottom, #050505, #000);
}

/* Animated grid */
.grid {
  position: absolute;
  inset: 0;
  z-index: -2;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: moveGrid 10s linear infinite;
  mask-image: radial-gradient(circle at center, black 40%, transparent 70%);
}

@keyframes moveGrid {
  from { transform: translateY(0); }
  to { transform: translateY(60px); }
}

/* ===== CONTENT ===== */
.container {
  text-align: center;
  max-width: 700px;
  padding: 20px;
}

.badge {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  font-size: 12px;
  color: #ccc;
  margin-bottom: 20px;
}

h1 {
  font-size: 64px;
  line-height: 1.05;
  letter-spacing: -1.5px;
  background: linear-gradient(90deg, #fff, #aaa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  margin-top: 20px;
  color: #bbb;
  font-size: 18px;
}

/* ===== LOADER ===== */
.loader {
  position: relative;
  width: 90px;
  height: 90px;
  margin: 50px auto 0;
}

/* Core pulse */
.core {
  position: absolute;
  width: 18px;
  height: 18px;
  background: white;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: pulse 1.5s ease-in-out infinite;
  box-shadow: 0 0 20px rgba(255,255,255,0.8);
}

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  50% { transform: translate(-50%, -50%) scale(1.6); opacity: 0.5; }
}

/* Orbit rings */
.orbit {
  position: absolute;
  width: 90px;
  height: 90px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  animation: spin 2.8s linear infinite;
}

.orbit::before {
  content: "";
  position: absolute;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  top: -5px;
  left: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 10px white;
}

.orbit.delay {
  animation-duration: 4s;
  opacity: 0.5;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* Status */
.status {
  margin-top: 25px;
  font-size: 14px;
  color: #888;
}

footer {
  position: absolute;
  bottom: 20px;
  text-align: center;
  width: 100%;
  color: #666;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="grid"></div>

<div class="container">
  <div class="badge">🚧 Under Construction</div>

  <h1>Cortexium Labs</h1>

  <p>
    We’re building AI-powered systems that help companies move faster, think smarter, and build better software.
  </p>

  <div class="loader">
    <div class="core"></div>
    <div class="orbit"></div>
    <div class="orbit delay"></div>
  </div>

  <div class="status">Launching soon...</div>
</div>

<footer>
  © 2026 Cortexium Labs
</footer>

</body>
</html>
